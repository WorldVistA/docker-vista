name: Build RPMS IRIS CE Images

on:
  push:
    branches: [master]
    paths:
      - 'Dockerfile.iris-ce'
      - 'IRIS/ce/**'
      - 'Common/KBANTCLN.m'
      - '.github/workflows/build-iris-ce.yml'
  pull_request:
    branches: [master]
    paths:
      - 'Dockerfile.iris-ce'
      - 'IRIS/ce/**'
      - 'Common/KBANTCLN.m'
      - '.github/workflows/build-iris-ce.yml'
  workflow_dispatch:
    inputs:
      push_images:
        description: 'Push images to registry'
        required: false
        default: 'true'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rpms-iris

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - source: worldvista
            repo: https://github.com/WorldVistA/FOIA-RPMS.git
            branch: master
            tags_suffix: ""          # gets :latest and :worldvista
          - source: civicactions
            repo: https://github.com/CivicActions/FOIA-RPMS.git
            branch: master
            tags_suffix: civicactions # gets :civicactions

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # For worldvista: tag as "latest" and "worldvista"
            # For civicactions: tag as "civicactions"
            type=raw,value=latest,enable=${{ matrix.tags_suffix == '' }}
            type=raw,value=${{ matrix.source }}
            type=sha,prefix=${{ matrix.source }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.iris-ce
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' && (github.event.inputs.push_images != 'false') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            RPMS_REPO=${{ matrix.repo }}
            RPMS_BRANCH=${{ matrix.branch }}
            instance=rpms
          cache-from: type=gha,scope=${{ matrix.source }}
          cache-to: type=gha,mode=max,scope=${{ matrix.source }}

      - name: Summary
        run: |
          echo "### ${{ matrix.source }} build complete :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source | \`${{ matrix.repo }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ matrix.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platforms | linux/amd64, linux/arm64 |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
